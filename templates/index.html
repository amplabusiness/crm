<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container py-3">
        <h1 class="app-title m-0"><i class="fa-solid fa-chart-line me-2"></i>Welcome</h1>
      </div>
    </header>

    <main class="content-area container my-4">
      <section class="status-panel" id="status">
        <p class="status-text">App is running.</p>
      </section>

      <section class="card mt-4">
        <div class="card-header d-flex align-items-center">
          <i class="fa-solid fa-signal me-2"></i>
          <span>Example Chart</span>
        </div>
        <div class="card-body">
          <canvas id="mainChart" height="120"></canvas>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
    <script src="/static/js/app.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
